{{- range $name, $service := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: {{ $.Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      serviceAccountName: streamingapp-s3
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $service.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $service.port }}
          env:
            - name: PORT
              value: {{ $service.port | quote }}
            - name: MONGO_URI
              value: {{ $.Values.app.mongoUri | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.app.secretName }}
                  key: jwt-secret
            - name: CLIENT_URLS
              value: {{ $.Values.app.clientUrls | quote }}
            - name: AWS_REGION
              value: {{ $.Values.app.awsRegion | quote }}
            - name: AWS_S3_BUCKET
              value: {{ $.Values.app.s3Bucket | quote }}
            - name: AWS_CDN_URL
              value: ""
            - name: STREAMING_PUBLIC_URL
              value: {{ $.Values.app.streamingPublicUrl | quote }}
          readinessProbe:
            httpGet:
              path: {{ $service.healthPath | quote }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $service.healthPath | quote }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml $.Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: {{ $service.port }}
      targetPort: http
{{- end }}
